<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YGOFM Fusions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0c10;color:#ccc;font-family:monospace;font-size:12px}

/* ── header ── */
#hdr{
  position:sticky;top:0;z-index:400;
  background:#08080e;border-bottom:1px solid #1e1e3a;
  padding:8px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
#hdr b{color:#d4a020;font-size:16px;white-space:nowrap}
#hdr-count{color:#555;font-size:11px;margin-left:auto;white-space:nowrap}

/* ── search ── */
#search-wrap{position:relative;flex:1;min-width:160px;max-width:340px}
#card-search{
  width:100%;background:#141420;border:1px solid #2a2a44;
  color:#ddd;font-family:monospace;font-size:13px;
  padding:6px 10px;border-radius:4px;outline:none;
}
#card-search:focus{border-color:#4444aa}
#card-search::placeholder{color:#444}
#search-drop{
  display:none;position:absolute;top:100%;left:0;right:0;z-index:500;
  background:#10101e;border:1px solid #2a2a44;border-top:none;
  max-height:240px;overflow-y:auto;border-radius:0 0 4px 4px;
}
#search-drop.open{display:block}
.sdrop-item{
  padding:6px 10px;cursor:pointer;
  border-bottom:1px solid #1a1a2e;font-size:12px;color:#ccc;
}
.sdrop-item:hover,.sdrop-item.active{background:#1e1e3a;color:#fff}

/* ── grid ── */
#grid{padding:8px}
.type-hdr{
  grid-column:1/-1;
  padding:4px 8px;margin:6px 0 2px;
  font-size:11px;font-weight:bold;letter-spacing:.6px;
  border-left:3px solid;
}
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(52px,1fr));
  gap:2px;margin-bottom:4px;
}
.cell{
  aspect-ratio:1;background:#0e0e16;border-bottom:2px solid #333;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;border-radius:2px;
  transition:outline .1s;
}
.cell:hover{outline:2px solid #6666cc;z-index:1}
.cell img{width:100%;height:100%;object-fit:cover;display:block}
.cell .ni{font-size:9px;color:#555;text-align:center;padding:2px;word-break:break-all}

/* ── tooltip ── */
#tip{
  display:none;position:fixed;z-index:600;
  background:#0e0e1c;border:1px solid #333360;
  border-radius:5px;width:240px;pointer-events:none;
  box-shadow:0 4px 18px rgba(0,0,0,.9);overflow:hidden;
}
#tip img{width:100%;display:block}
#tip-info{padding:7px 9px;font-size:11px;color:#bbb;line-height:1.5}
#tip-name{font-size:13px;font-weight:bold;color:#eee}
#tip-stats{color:#777;font-size:10px;margin-top:2px}

/* ── modal overlay ── */
#overlay{
  display:none;position:fixed;inset:0;z-index:700;
  background:rgba(0,0,0,.75);overflow-y:auto;padding:20px 10px;
}
#overlay.open{display:block}
#modal{
  background:#10101a;border:1px solid #2a2a3a;border-radius:6px;
  max-width:600px;margin:0 auto;
  transition:max-width .2s;
}
#modal.has-panel{max-width:900px}

/* modal header */
#m-head{
  display:flex;gap:12px;align-items:flex-start;
  padding:12px;background:#0c0c16;border-bottom:1px solid #1e1e2e;
  border-radius:6px 6px 0 0;
}
#m-img{width:120px;flex-shrink:0;border:1px solid #2a2a3a;border-radius:3px}
#m-info{flex:1;min-width:0}
#m-name{font-size:16px;font-weight:bold;color:#eee;margin-bottom:4px}
#m-stats{font-size:11px;color:#888;line-height:1.6}
#m-close{
  flex-shrink:0;background:none;border:none;color:#555;
  font-size:18px;cursor:pointer;padding:2px 6px;
}
#m-close:hover{color:#eee}

/* modal partner filter */
#m-filter-wrap{padding:7px 12px;background:#0a0a12;border-bottom:1px solid #1a1a2a}
#m-filter{
  width:100%;background:#141420;border:1px solid #2a2a44;
  color:#ddd;font-family:monospace;font-size:12px;
  padding:5px 10px;border-radius:4px;outline:none;
}
#m-filter:focus{border-color:#4444aa}
#m-filter::placeholder{color:#444}
.fi-group.faded,.mf-row.faded,.cw-row.faded{opacity:.15;pointer-events:none;order:1}

/* modal body sections */
.m-section{padding:10px 12px;border-bottom:1px solid #1a1a2a;display:flex;flex-direction:column}
.m-section:last-child{border-bottom:none}

/* body + right panel layout */
#m-content-wrap{display:flex;align-items:flex-start}
#m-body{flex:1;min-width:0}

/* right panel */
#m-right-panel{
  width:210px;flex-shrink:0;
  border-left:1px solid #1a1a2a;
  display:none;flex-direction:column;
  position:sticky;top:0;align-self:flex-start;
  max-height:100vh;overflow-y:auto;
  background:#0c0c14;
}
#m-right-panel.active{display:flex}
#m-rp-title{
  position:sticky;top:0;z-index:1;
  padding:8px 10px 6px;
  font-size:10px;font-weight:bold;letter-spacing:.6px;
  color:#5577aa;background:#0c0c14;
  border-bottom:1px solid #1a1a2a;
}
.mp-row{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px;border-bottom:1px solid #0f0f1c;cursor:pointer;
}
.mp-row:hover{background:#141420}
.mp-name{font-size:11px;color:#ccc;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-type{font-size:9px;color:#555;margin-top:1px}
.m-section-title{
  font-size:11px;font-weight:bold;letter-spacing:.6px;
  color:#6677aa;margin-bottom:8px;
}
.m-section-title.orange{color:#aa7733}
.m-section-title.teal{color:#3a9a88}

/* combines-with rows */
.cw-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 0;border-bottom:1px solid #14141e;cursor:pointer;
}
.cw-row:hover{background:#0e0e18}
.cw-arrow{color:#333;font-size:11px;flex-shrink:0;padding:0 2px}
.cw-result-info{flex-shrink:0;width:90px;min-width:0}
.cw-result-name{font-size:10px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cw-types{display:flex;flex-wrap:wrap;gap:3px;padding:6px 0 8px;border-bottom:1px solid #1a1a2a;margin-bottom:2px}
.cw-type-chip{font-size:9px;font-weight:bold;letter-spacing:.3px;padding:2px 5px;border-radius:3px;white-space:nowrap}

/* fuses-into rows */
.fi-group{
  display:flex;align-items:center;gap:8px;
  padding:5px 0;border-bottom:1px solid #14141e;
}
.fi-group:last-child{border-bottom:none}
.fi-thumb{
  width:40px;height:40px;flex-shrink:0;
  border:1px solid #2a2a3a;border-radius:2px;object-fit:cover;
  background:#0a0a12;
}
.fi-thumb-ph{
  width:40px;height:40px;flex-shrink:0;
  border:1px solid #2a2a3a;border-radius:2px;
  background:#0a0a12;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#444;text-align:center;
}
.fi-result{flex:1;min-width:0}
.fi-result-name{
  font-size:12px;color:#ddd;font-weight:bold;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fi-result-sub{font-size:10px;color:#666}
.fi-partners{font-size:10px;color:#555;margin-top:2px;line-height:1.4}
.fi-atk{color:#d4a020;margin-left:4px}
.plus{color:#444;font-size:16px;flex-shrink:0}

/* made-from rows */
.mf-row{
  display:flex;align-items:center;gap:6px;
  padding:4px 0;border-bottom:1px solid #14141e;font-size:11px;
}
.mf-row:last-child{border-bottom:none}
.mf-name{color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}

.empty-msg{color:#444;font-size:11px;padding:4px 0}

/* loading */
#loading{
  text-align:center;padding:40px;color:#444;font-size:14px;letter-spacing:1px;
}
</style>
</head>
<body>

<div id="hdr">
  <b>&#9876; YGOFM FUSIONS</b>
  <div id="search-wrap">
    <input id="card-search" type="text" placeholder="search or filter cards&#8230;" autocomplete="off" spellcheck="false">
    <div id="search-drop"></div>
  </div>
  <span id="hdr-count"></span>
</div>

<div id="loading">Loading card data&#8230;</div>
<div id="grid"></div>

<!-- tooltip -->
<div id="tip">
  <img id="tip-img" src="" alt="">
  <div id="tip-info">
    <div id="tip-name"></div>
    <div id="tip-stats"></div>
  </div>
</div>

<!-- modal -->
<div id="overlay">
  <div id="modal">
    <div id="m-head">
      <img id="m-img" src="" alt="">
      <div id="m-info">
        <div id="m-name"></div>
        <div id="m-stats"></div>
      </div>
      <button id="m-close" title="Close">&#10005;</button>
    </div>
    <div id="m-filter-wrap">
      <input id="m-filter" type="text" placeholder="search fusion partner or material&#8230;" autocomplete="off" spellcheck="false">
    </div>
    <div id="m-content-wrap">
      <div id="m-body"></div>
      <div id="m-right-panel"></div>
    </div>
  </div>
</div>

<script>window.TAFFY = arr => arr;</script>
<script src="data/cards.js"></script>
<script src="data/fusions.js"></script>
<script src="data/results.js"></script>
<script src="data/types_and_stars.js"></script>
<script src="data/local_images.js"></script>
<script src="data/fandom_images.js"></script>

<script>
const THUMB = "https://images.ygoprodeck.com/images/cards_cropped";
const FULL  = "https://images.ygoprodeck.com/images/cards";
const CODE_FIXES = { "Meteor B. Dragon": "90660762" };

const TYPE_COLORS = {
  Dragon:"#c44",Spellcaster:"#84a",Zombie:"#5a7",Warrior:"#a83",
  "Beast-Warrior":"#976",Beast:"#6a4","Winged Beast":"#69b",Fiend:"#855",
  Fairy:"#b8b",Insect:"#7a5",Dinosaur:"#a64",Reptile:"#4a6",
  Fish:"#48b","Sea Serpent":"#37a",Machine:"#777",Thunder:"#aa4",
  Aqua:"#4ab",Pyro:"#c73",Rock:"#885",Plant:"#4a4",
  Magic:"#46a",Trap:"#a46",Ritual:"#77a",Equip:"#6a8",
};

function atkColor(atk) {
  if (atk >= 3000) return "#f44";
  if (atk >= 2500) return "#f80";
  if (atk >= 2000) return "#fa0";
  if (atk >= 1500) return "#cc0";
  return "#888";
}

// ── indices ──────────────────────────────────────────────
let byId = {}, mat2Idx = {}, fusionResultIds = new Set();

function buildIndices() {
  for (const c of card_db) byId[c.Id] = c;

  for (let i = 1; i < fusionsList.length; i++) {
    if (!fusionsList[i]) continue;
    for (const fu of fusionsList[i]) {
      fusionResultIds.add(fu.result);
      if (!mat2Idx[fu.card]) mat2Idx[fu.card] = [];
      mat2Idx[fu.card].push([i, fu.result]);
    }
  }
}

// ── image helpers ─────────────────────────────────────────
function cardCode(c) {
  let code = c.CardCode || "";
  if (!code || code === "00000000") code = CODE_FIXES[c.Name] || "";
  return code;
}
function thumbUrl(c) { const k = cardCode(c); return k ? THUMB+"/"+k+".jpg" : ""; }
function fullUrl(c)  { const k = cardCode(c); return k ? FULL+"/"+k+".jpg" : ""; }

function localUrl(c) {
  return (localImages && localImages[c.Id]) || (fandomImages && fandomImages[c.Id]) || "";
}

function imgEl(src, full, cls, local) {
  if (!src && !full && !local) return null;
  const img = document.createElement("img");
  img.className = cls;
  img.src = src || full || local;
  img.onerror = () => {
    if (full && img.src !== full) { img.src = full; }
    else if (local && img.src !== local) { img.src = local; }
    else { img.style.display = "none"; }
  };
  return img;
}

function miniThumb(card, cls="fi-thumb") {
  const src = thumbUrl(card), full = fullUrl(card);
  const el = imgEl(src, full, cls, localUrl(card));
  if (!el) {
    const ph = document.createElement("div");
    ph.className = cls + "-ph";
    ph.textContent = (card.Name||"?").slice(0,4);
    return ph;
  }
  return el;
}

// ── grid ─────────────────────────────────────────────────
function buildGrid(filterQ) {
  const q = (filterQ||"").toLowerCase().trim();
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";

  // gather result cards
  const allResults = [...fusionResultIds].map(id => byId[id]).filter(Boolean);

  // group by type, sort by ATK desc within group
  const groups = {};
  for (const c of allResults) {
    const t = cardTypes[c.Type] || "Unknown";
    const sr = (c.Name+" "+t).toLowerCase();
    if (q && !sr.includes(q)) continue;
    if (!groups[t]) groups[t] = [];
    groups[t].push(c);
  }
  for (const t in groups) groups[t].sort((a,b) => b.Attack - a.Attack);

  // order types by max ATK
  const typeOrder = Object.keys(groups).sort((a,b) => {
    const maxA = Math.max(...groups[a].map(c=>c.Attack));
    const maxB = Math.max(...groups[b].map(c=>c.Attack));
    return maxB - maxA;
  });

  let total = 0;
  for (const t of typeOrder) {
    const color = TYPE_COLORS[t] || "#555";
    const cards = groups[t];
    total += cards.length;

    // type header
    const hdr = document.createElement("div");
    hdr.className = "type-hdr";
    hdr.style.cssText = `color:${color};border-color:${color};background:${color}22`;
    hdr.innerHTML = `${t.toUpperCase()} <span style="float:right;opacity:.7">${cards.length}</span>`;
    gridEl.appendChild(hdr);

    // card grid
    const row = document.createElement("div");
    row.className = "card-grid";
    for (const c of cards) {
      row.appendChild(makeCell(c));
    }
    gridEl.appendChild(row);
  }

  document.getElementById("hdr-count").textContent =
    total + " cards • " + typeOrder.length + " types";
}

function makeCell(c) {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.style.borderBottomColor = atkColor(c.Attack);
  cell.dataset.id = c.Id;

  const src = thumbUrl(c), full = fullUrl(c), local = localUrl(c);
  if (src || full || local) {
    const img = document.createElement("img");
    img.src = src || full || local;
    img.loading = "lazy";
    img.alt = c.Name;
    img.onerror = () => {
      if (full && img.src !== full) img.src = full;
      else if (local && img.src !== local) img.src = local;
      else img.replaceWith(makePlaceholder(c));
    };
    cell.appendChild(img);
  } else {
    cell.appendChild(makePlaceholder(c));
  }

  cell.addEventListener("mouseenter", e => showTip(c, e));
  cell.addEventListener("mousemove",  e => moveTip(e));
  cell.addEventListener("mouseleave", hideTip);
  cell.addEventListener("click", () => openModal(c.Id));

  return cell;
}

function makePlaceholder(c) {
  const d = document.createElement("div");
  d.className = "ni";
  d.textContent = (c.Name||"?").slice(0,5);
  return d;
}

// ── tooltip ──────────────────────────────────────────────
const tip = document.getElementById("tip");
const tipImg  = document.getElementById("tip-img");
const tipName = document.getElementById("tip-name");
const tipStat = document.getElementById("tip-stats");
let tipTimer = null;

function showTip(c, e) {
  clearTimeout(tipTimer);
  tipName.textContent = c.Name;
  const t = cardTypes[c.Type]||"";
  const isMonster = c.Type < 20;
  tipStat.textContent = (isMonster ? `ATK ${c.Attack} / DEF ${c.Defense} · ` : "") + t;

  const src = fullUrl(c) || thumbUrl(c), local = localUrl(c);
  if (src || local) {
    tipImg.src = src || local; tipImg.style.display = "block";
    tipImg.onerror = () => {
      if (local && tipImg.src !== local) { tipImg.src = local; }
      else { tipImg.style.display = "none"; }
    };
  } else {
    tipImg.style.display = "none";
  }

  tip.style.display = "block";
  moveTip(e);
}

function moveTip(e) {
  const W = window.innerWidth, H = window.innerHeight;
  const tw = 240, th = tip.offsetHeight;
  let x = e.clientX + 14, y = e.clientY - 8;
  if (x + tw > W) x = e.clientX - tw - 10;
  if (y + th > H) y = H - th - 4;
  if (y < 0) y = 4;
  tip.style.left = x + "px";
  tip.style.top  = y + "px";
}

function hideTip() {
  tipTimer = setTimeout(() => { tip.style.display = "none"; }, 80);
}

// ── modal ─────────────────────────────────────────────────
const overlay = document.getElementById("overlay");
const mImg    = document.getElementById("m-img");
const mName   = document.getElementById("m-name");
const mStats  = document.getElementById("m-stats");
const mBody   = document.getElementById("m-body");

const mFilter           = document.getElementById("m-filter");
const mIncompatiblePanel = document.getElementById("m-right-panel");
const modalEl           = document.getElementById("modal");
let   modalCardId       = null;

document.getElementById("m-close").onclick = closeModal;
overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

function closeModal() {
  overlay.classList.remove("open");
  mFilter.value = "";
  modalCardId = null;
  applyPartnerFilter("");
}

function applyPartnerFilter(q) {
  const lq = q.toLowerCase().trim();
  for (const row of mBody.querySelectorAll(".fi-group")) {
    row.classList.toggle("faded", !!lq && !(row.dataset.partners||"").includes(lq));
  }
  for (const row of mBody.querySelectorAll(".cw-row")) {
    row.classList.toggle("faded", !!lq && !(row.dataset.partners||"").includes(lq));
  }
  for (const row of mBody.querySelectorAll(".mf-row")) {
    row.classList.toggle("faded", !!lq && !(row.dataset.materials||"").includes(lq));
  }
  updateIncompatiblePanel(lq);
}

function updateIncompatiblePanel(lq) {
  if (!lq) {
    mIncompatiblePanel.classList.remove("active");
    mIncompatiblePanel.innerHTML = "";
    modalEl.classList.remove("has-panel");
    return;
  }

  // Build set of valid partner IDs for current modal card
  const partnerIds = new Set();
  if (modalCardId !== null) {
    if (fusionsList[modalCardId]) {
      for (const fu of fusionsList[modalCardId]) partnerIds.add(fu.card);
    }
    if (mat2Idx[modalCardId]) {
      for (const [mat1Id] of mat2Idx[modalCardId]) partnerIds.add(mat1Id);
    }
    partnerIds.add(modalCardId); // exclude self
  }

  // Cards matching query that are NOT fusion partners
  const incompatible = card_db.filter(c => {
    if (partnerIds.has(c.Id)) return false;
    const typeName = (cardTypes[c.Type] || "").toLowerCase();
    return c.Name.toLowerCase().includes(lq) || typeName.includes(lq);
  }).slice(0, 50);

  mIncompatiblePanel.innerHTML = "";

  const titleEl = document.createElement("div");
  titleEl.id = "m-rp-title";
  titleEl.textContent = "INCOMPATIBLE CARDS (" + incompatible.length + (incompatible.length === 50 ? "+" : "") + ")";
  mIncompatiblePanel.appendChild(titleEl);

  for (const card of incompatible) {
    const row = document.createElement("div");
    row.className = "mp-row";

    const thumb = miniThumb(card, "fi-thumb");
    thumb.style.cssText = "width:32px;height:32px;flex-shrink:0";
    row.appendChild(thumb);

    const info = document.createElement("div");
    info.style.cssText = "flex:1;min-width:0";

    const name = document.createElement("div");
    name.className = "mp-name";
    name.textContent = card.Name;

    const type = document.createElement("div");
    type.className = "mp-type";
    const typeName = cardTypes[card.Type] || "";
    const isM = card.Type < 20;
    type.textContent = typeName + (isM ? " · " + card.Attack : "");

    info.appendChild(name);
    info.appendChild(type);
    row.appendChild(info);

    row.addEventListener("click", () => openModal(card.Id));
    mIncompatiblePanel.appendChild(row);
  }

  mIncompatiblePanel.classList.add("active");
  modalEl.classList.add("has-panel");
}

mFilter.addEventListener("input", () => applyPartnerFilter(mFilter.value.trim()));

function openModal(cardId) {
  const c = byId[cardId];
  if (!c) return;

  mFilter.value = "";
  modalCardId = cardId;
  updateIncompatiblePanel("");

  // header
  const src = fullUrl(c), local = localUrl(c);
  if (src || local) {
    mImg.src = src || local; mImg.style.display = "block";
    mImg.onerror = () => {
      if (local && mImg.src !== local) { mImg.src = local; }
      else { mImg.style.display = "none"; }
    };
  } else mImg.style.display = "none";
  mName.textContent = c.Name;
  const t = cardTypes[c.Type] || "";
  const isM = c.Type < 20;
  const attrNames = {0:"Dark",1:"Earth",2:"Fire",3:"Light",4:"Water",5:"Wind",6:"Divine"};
  mStats.innerHTML =
    (isM ? `ATK <b style="color:${atkColor(c.Attack)}">${c.Attack}</b> &nbsp; DEF ${c.Defense}<br>` : "") +
    `${t}` + (c.Attribute != null ? ` &middot; ${attrNames[c.Attribute]||""}` : "");

  mBody.innerHTML = "";
  mBody.appendChild(makeFusesIntoSection(c));
  mBody.appendChild(makeCombinesWithSection(c));
  mBody.appendChild(makeMadeFromSection(c));

  overlay.classList.add("open");
  overlay.scrollTop = 0;
}

// "Fuses Into": all fusions where this card is a material
function makeFusesIntoSection(c) {
  const sec = document.createElement("div");
  sec.className = "m-section";

  // Collect fusions as _card1 (fusionsList[c.Id]) and as _card2 (mat2Idx[c.Id])
  // Group by result
  const grouped = {}; // resultId -> [partnerId, ...]
  if (fusionsList[c.Id]) {
    for (const fu of fusionsList[c.Id]) {
      if (!grouped[fu.result]) grouped[fu.result] = [];
      grouped[fu.result].push(fu.card);
    }
  }
  if (mat2Idx[c.Id]) {
    for (const [mat1Id, resId] of mat2Idx[c.Id]) {
      if (!grouped[resId]) grouped[resId] = [];
      grouped[resId].push(mat1Id);
    }
  }

  const resultIds = Object.keys(grouped).map(Number);
  resultIds.sort((a,b) => (byId[b]?.Attack||0) - (byId[a]?.Attack||0));

  const title = document.createElement("div");
  title.className = "m-section-title";
  title.textContent = `⚔ FUSES INTO (${resultIds.length} results)`;
  sec.appendChild(title);

  if (resultIds.length === 0) {
    const em = document.createElement("div");
    em.className = "empty-msg";
    em.textContent = "No fusions found for this card.";
    sec.appendChild(em);
    return sec;
  }

  for (const resId of resultIds) {
    const rc = byId[resId];
    if (!rc) continue;
    const partners = grouped[resId].map(pid => byId[pid]).filter(Boolean);

    const row = document.createElement("div");
    row.className = "fi-group";
    row.dataset.partners = partners.map(p => p.Name.toLowerCase()).join("|");

    // result image
    row.appendChild(miniThumb(rc));

    // result info
    const info = document.createElement("div");
    info.className = "fi-result";
    const rname = document.createElement("div");
    rname.className = "fi-result-name";
    const isM = rc.Type < 20;
    rname.innerHTML = `${escHtml(rc.Name)}<span class="fi-atk">${isM ? rc.Attack : ""}</span>`;
    const rsub = document.createElement("div");
    rsub.className = "fi-result-sub";
    rsub.textContent = cardTypes[rc.Type] || "";
    const rpart = document.createElement("div");
    rpart.className = "fi-partners";
    if (partners.length <= 4) {
      rpart.textContent = "with: " + partners.map(p=>p.Name).join(", ");
    } else {
      rpart.textContent = "with: " + partners.slice(0,3).map(p=>p.Name).join(", ") +
        ` +${partners.length-3} more`;
    }
    info.appendChild(rname);
    info.appendChild(rsub);
    info.appendChild(rpart);

    row.appendChild(info);

    // click result → open its modal
    row.style.cursor = "pointer";
    row.addEventListener("click", () => openModal(resId));

    sec.appendChild(row);
  }

  return sec;
}

// "Combines With": all unique partner cards this card can fuse with, plus the fusion result
function makeCombinesWithSection(c) {
  const sec = document.createElement("div");
  sec.className = "m-section";

  // Build partner → resultId map (first-wins dedup)
  const partnerResult = {};
  if (fusionsList[c.Id]) {
    for (const fu of fusionsList[c.Id]) {
      if (!(fu.card in partnerResult)) partnerResult[fu.card] = fu.result;
    }
  }
  if (mat2Idx[c.Id]) {
    for (const [mat1Id, resId] of mat2Idx[c.Id]) {
      if (!(mat1Id in partnerResult)) partnerResult[mat1Id] = resId;
    }
  }

  const partners = Object.keys(partnerResult).map(id => byId[Number(id)]).filter(Boolean);
  partners.sort((a, b) => (b.Attack || 0) - (a.Attack || 0));

  const title = document.createElement("div");
  title.className = "m-section-title teal";
  title.textContent = `⬡ COMBINES WITH (${partners.length} materials)`;
  sec.appendChild(title);

  if (partners.length === 0) {
    const em = document.createElement("div");
    em.className = "empty-msg";
    em.textContent = "No fusion partners found.";
    sec.appendChild(em);
    return sec;
  }

  // Type compatibility chips
  const typeCounts = {};
  for (const p of partners) {
    const t = cardTypes[p.Type] || "Unknown";
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  }
  const typesBar = document.createElement("div");
  typesBar.className = "cw-types";
  for (const [t, count] of Object.entries(typeCounts).sort((a, b) => b[1] - a[1])) {
    const color = TYPE_COLORS[t] || "#555";
    const chip = document.createElement("span");
    chip.className = "cw-type-chip";
    chip.style.cssText = `color:${color};background:${color}22;border:1px solid ${color}55`;
    chip.textContent = t + " " + count;
    typesBar.appendChild(chip);
  }
  sec.appendChild(typesBar);

  for (const p of partners) {
    const rc = byId[partnerResult[p.Id]];

    const row = document.createElement("div");
    row.className = "cw-row";
    row.dataset.partners = p.Name.toLowerCase();

    // Partner
    const pThumb = miniThumb(p, "fi-thumb");
    pThumb.style.cssText = "width:32px;height:32px;flex-shrink:0";
    row.appendChild(pThumb);

    const pInfo = document.createElement("div");
    pInfo.style.cssText = "flex:1;min-width:0";
    const pName = document.createElement("div");
    pName.className = "mp-name";
    pName.textContent = p.Name;
    const pSub = document.createElement("div");
    pSub.className = "mp-type";
    pSub.textContent = (cardTypes[p.Type] || "") + (p.Type < 20 ? " \xb7 " + p.Attack : "");
    pInfo.appendChild(pName);
    pInfo.appendChild(pSub);
    row.appendChild(pInfo);

    // Arrow + result
    const arrow = document.createElement("span");
    arrow.className = "cw-arrow";
    arrow.textContent = "→";
    row.appendChild(arrow);

    if (rc) {
      const rThumb = miniThumb(rc, "fi-thumb");
      rThumb.style.cssText = "width:32px;height:32px;flex-shrink:0";
      row.appendChild(rThumb);

      const rInfo = document.createElement("div");
      rInfo.className = "cw-result-info";
      const rName = document.createElement("div");
      rName.className = "cw-result-name";
      rName.textContent = rc.Name;
      const rAtk = document.createElement("div");
      rAtk.className = "mp-type";
      if (rc.Type < 20) rAtk.innerHTML = `<span style="color:${atkColor(rc.Attack)}">${rc.Attack}</span>`;
      rInfo.appendChild(rName);
      rInfo.appendChild(rAtk);
      row.appendChild(rInfo);
    }

    row.addEventListener("click", () => openModal(p.Id));
    sec.appendChild(row);
  }

  return sec;
}

// "Made From": all material pairs that produce this card
function makeMadeFromSection(c) {
  const sec = document.createElement("div");
  sec.className = "m-section";

  const title = document.createElement("div");
  title.className = "m-section-title orange";

  const pairs = resultsList[c.Id] || [];
  title.textContent = `✦ MADE FROM (${pairs.length} combinations)`;
  sec.appendChild(title);

  if (pairs.length === 0) {
    const em = document.createElement("div");
    em.className = "empty-msg";
    em.textContent = "Not a fusion result.";
    sec.appendChild(em);
    return sec;
  }

  for (const pair of pairs) {
    const m1 = byId[pair.card1], m2 = byId[pair.card2];
    if (!m1 || !m2) continue;

    const row = document.createElement("div");
    row.className = "mf-row";
    row.dataset.materials = [m1.Name, m2.Name].map(n => n.toLowerCase()).join("|");

    row.appendChild(miniThumb(m1));

    const n1 = document.createElement("div");
    n1.className = "mf-name";
    n1.textContent = m1.Name;
    n1.style.cursor = "pointer";
    n1.addEventListener("click", () => openModal(m1.Id));
    row.appendChild(n1);

    const plus = document.createElement("span");
    plus.className = "plus";
    plus.textContent = "+";
    row.appendChild(plus);

    row.appendChild(miniThumb(m2));

    const n2 = document.createElement("div");
    n2.className = "mf-name";
    n2.textContent = m2.Name;
    n2.style.cursor = "pointer";
    n2.addEventListener("click", () => openModal(m2.Id));
    row.appendChild(n2);

    sec.appendChild(row);
  }

  return sec;
}

// ── card search (all 722 cards) ───────────────────────────
const searchInput = document.getElementById("card-search");
const searchDrop  = document.getElementById("search-drop");
let dropActive = -1, dropItems = [], dropFiltered = [];

function initSearch() {
  const allNames = card_db.map(c => ({id: c.Id, name: c.Name}));

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    buildGrid(q);
    if (!q) { closeDrop(); return; }
    dropFiltered = allNames.filter(n => n.name.toLowerCase().includes(q)).slice(0, 20);
    if (dropFiltered.length === 1) { selectCard(dropFiltered[0].id); return; }
    renderDrop(dropFiltered);
  });

  searchInput.addEventListener("keydown", e => {
    if (!searchDrop.classList.contains("open")) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setActive(dropActive + 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setActive(dropActive - 1); }
    else if (e.key === "Enter") {
      e.preventDefault();
      const item = dropItems[dropActive] || dropItems[0];
      if (item) selectCard(Number(item.dataset.id));
    }
    else if (e.key === "Escape") { closeDrop(); searchInput.blur(); }
  });

  searchInput.addEventListener("blur", () => {
    setTimeout(closeDrop, 150);
  });
}

function renderDrop(matches) {
  searchDrop.innerHTML = "";
  dropItems = [];
  dropActive = -1;
  if (!matches.length) { closeDrop(); return; }

  for (const m of matches) {
    const div = document.createElement("div");
    div.className = "sdrop-item";
    div.textContent = m.name;
    div.dataset.id = m.id;
    div.addEventListener("mousedown", e => { e.preventDefault(); selectCard(m.id); });
    searchDrop.appendChild(div);
    dropItems.push(div);
  }
  searchDrop.classList.add("open");
}

function setActive(idx) {
  dropActive = Math.max(-1, Math.min(dropItems.length - 1, idx));
  dropItems.forEach((el,i) => el.classList.toggle("active", i === dropActive));
  if (dropActive >= 0) dropItems[dropActive].scrollIntoView({block:"nearest"});
}

function selectCard(id) {
  closeDrop();
  searchInput.value = "";
  buildGrid();
  openModal(id);
  setTimeout(() => mFilter.focus(), 50);
}

function closeDrop() {
  searchDrop.classList.remove("open");
  searchDrop.innerHTML = "";
  dropItems = [];
  dropActive = -1;
}

// ── utils ─────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── init ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // scripts loaded synchronously before this runs
  buildIndices();
  document.getElementById("loading").remove();
  buildGrid();
  initSearch();
});
</script>
